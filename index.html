<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Twitch Layout</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background: linear-gradient(135deg,#050505,#0f172a);
    height:100vh;
    overflow:hidden;
    position:relative;
}

/* subtle background glow */
body::before{
    content:"";
    position:absolute;
    inset:0;
    background:
        radial-gradient(circle at 20% 20%, rgba(0,255,255,0.08), transparent 30%),
        radial-gradient(circle at 80% 80%, rgba(168,85,247,0.08), transparent 30%);
    z-index:0;
}

/* Twitch stream */
.stream-container{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:85%;
    height:80%;
    border-radius:20px;
    overflow:hidden;
    border:2px solid rgba(255,255,255,0.1);
    box-shadow:0 0 30px rgba(0,255,255,0.12);
    z-index:1;
}

.stream-container iframe{
    width:100%;
    height:100%;
    border:none;
}

/* Photo placeholder */
.photo-box{
    position:absolute;
    top:20px;
    left:20px;
    width:180px;
    height:180px;
    border-radius:18px;
    background:rgba(255,255,255,0.05);
    border:2px solid rgba(255,255,255,0.12);
    backdrop-filter:blur(10px);
    box-shadow:0 0 20px rgba(255,255,255,0.08);
    display:flex;
    justify-content:center;
    align-items:center;
    color:rgba(255,255,255,0.5);
    font-size:18px;
    z-index:2;
}

/* small corner accents */
.corner{
    position:absolute;
    width:35px;
    height:35px;
    border:2px solid cyan;
    opacity:.5;
}

.corner1{
    top:15px;
    right:15px;
    border-left:none;
    border-bottom:none;
}

.corner2{
    bottom:15px;
    left:15px;
    border-right:none;
    border-top:none;
}
</style>
</head>
<body>

<div class="photo-box">
    <img src="IMG_1764.jpeg" style="width:100%;height:100%;object-fit:cover;border-radius:18px;">
</div>

<div class="stream-container">
    <iframe
        src="https://player.twitch.tv/?channel=ace29621&parent=7bmain.github.io"
        allowfullscreen>
    </iframe>
</div>

<div class="corner corner1"></div>
<div class="corner corner2"></div>

</body>
</html>
